name: Release
'on':
  push:
    tags:
    - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Existing Git tag to publish, for example v0.5.0
        required: true
        type: string
permissions:
  contents: write
jobs:
  prepare:
    name: Resolve release tag
    runs-on: ubuntu-24.04
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
    - name: Resolve tag and version
      id: resolve
      env:
        EVENT_NAME: ${{ github.event_name }}
        INPUT_TAG: ${{ inputs.tag }}
        REF_NAME: ${{ github.ref_name }}
      run: "set -euo pipefail\n\nif [ \"$EVENT_NAME\" = \"workflow_dispatch\" ]; then\n\
        \  tag=\"$INPUT_TAG\"\nelse\n  tag=\"$REF_NAME\"\nfi\n\ncase \"$tag\" in\n\
        \  v*) ;;\n  *)\n    echo \"Release tags must start with 'v': $tag\" >&2\n\
        \    exit 1\n    ;;\nesac\n\necho \"tag=$tag\" >> \"$GITHUB_OUTPUT\"\necho\
        \ \"version=${tag#v}\" >> \"$GITHUB_OUTPUT\"\n"
  create-release:
    name: Create draft release
    needs: prepare
    runs-on: ubuntu-24.04
    steps:
    - name: Create draft release when missing
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ needs.prepare.outputs.tag }}
      run: "set -euo pipefail\n\nif gh release view \"$TAG\" >/dev/null 2>&1; then\n\
        \  exit 0\nfi\n\ngh release create \"$TAG\" \\\n  --draft \\\n  --generate-notes\
        \ \\\n  --title \"$TAG\" \\\n  --verify-tag\n"
  build-assets:
    name: Build ${{ matrix.target }}
    needs:
    - prepare
    - create-release
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
        - runner: ubuntu-24.04
          target: x86_64-unknown-linux-gnu
        - runner: ubuntu-latest
          target: aarch64-unknown-linux-gnu
    steps:
    - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
      with:
        ref: ${{ needs.prepare.outputs.tag }}
    - name: Setup Rust
      uses: leynos/shared-actions/.github/actions/setup-rust@b61ad14766ae81b830abdaf066eb3d9b6c4f537b
    - name: Build release archive
      run: make release-archive TARGET=${{ matrix.target }} VERSION=${{ needs.prepare.outputs.version
        }}
    - name: Upload release archive
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ needs.prepare.outputs.tag }}
      run: gh release upload "$TAG" dist/*.tgz --clobber
  publish-release:
    name: Publish release
    needs:
    - prepare
    - build-assets
    runs-on: ubuntu-24.04
    steps:
    - name: Publish draft release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        TAG: ${{ needs.prepare.outputs.tag }}
      run: 'set -euo pipefail


        gh release edit "$TAG" --draft=false

        '
